<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL CLOCK</title>
<style>
    #DigitalClock{
        font-size: 60px;
        font-family: 'Arial', sans-serif;
        background-color: black;
        color: #08fcc3;
        text-align: center;
        margin-top: 20%;
    }
    body{
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
        
    </style>
</head>
<body>
    <div id="DigitalClock"></div>
    <script type="text/javascript">
        function ShowTime(){
            var date = new Date();
            var h = date.getHours();
            var m = date.getMinutes();
            var s = date.getSeconds();
            var session = "AM";
            if(h == 0){
                h = 12;
            }
            if(h > 12){
                h = h - 12;
                session = "PM";
            }
         /*   if(h < 10){
                h = "0" + h;
            }
            if(m < 10){
                m = "0" + m;
            }
            if(s < 10){
                s = "0" + s;
            }*/
           h= (h < 10) ? "0" + h : h;
              m= (m < 10) ? "0" + m : m;
              s= (s < 10) ? "0" + s : s;
            document.getElementById("DigitalClock").innerText = h + ":" + m + ":" + s + " " + session;
            setTimeout(ShowTime, 1000);
        }   
         ShowTime();

        </script>
</body>
</html>
