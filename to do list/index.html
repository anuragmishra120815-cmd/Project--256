<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO LIST</title>

    <style>
        body {
            font-family: Arial;
            background: #9e6aec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 400px;
        }

        input[type="text"] {
            width: 300px;
            height: 30px;
            padding-left: 10px;
        }

        input[type="button"] {
            width: 100px;
            height: 35px;
            margin-top: 10px;
            cursor: pointer;
        }

        li {
            margin-top: 10px;
            background: #eee;
            padding: 10px;
            list-style: none;
            cursor: pointer;
        }

        li:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>TO-DO LIST</h1>

        <input type="text" placeholder="Enter todo item" id="box">

        <br><br>

        <input type="button" value="Add" onclick="add_item()">

        <ul id="list_items"></ul>

    </div>

    <script>

        function add_item() {

            let item = document.getElementById("box");
            let list_items = document.getElementById("list_items");

            if (item.value != "") {

                let make_li = document.createElement("li");

                make_li.appendChild(document.createTextNode(item.value));

                list_items.appendChild(make_li);

                item.value = "";

                make_li.onclick = function () {
                    this.parentNode.removeChild(this);
                }

            }
            else {
                alert("Please enter a to-do item.");
            }
        }

    </script>

</body>

</html>
